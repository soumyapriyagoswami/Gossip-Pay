# Server
server.port=8080

# H2 in-memory database (zero setup)
spring.datasource.url=jdbc:h2:mem:upimesh
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window (how long a packet hash is remembered)
upi.mesh.idempotency-ttl-seconds=86400

# Reliability: how long a claim can sit in PENDING before the reaper assumes
# the owning process died and releases it back up for retry.
upi.mesh.idempotency-pending-timeout-seconds=120
# How often the reaper sweeps for stuck PENDING claims.
upi.mesh.idempotency-reaper-interval-ms=30000
# How often the reconciliation job cross-checks the idempotency cache
# against the Transaction table.
upi.mesh.reconciliation-interval-ms=60000
# How far back to look for "Transaction exists but cache forgot it" drift.
upi.mesh.reconciliation-lookback-seconds=3600

# Packet freshness window — anything older than this is rejected as replay
upi.mesh.packet-max-age-seconds=86400

# --------------------------------------------------------------------------
# This is the DEFAULT profile: zero setup, H2 in-memory DB, in-process
# idempotency cache, synchronous settlement — exactly the original demo mode.
#
# For the full event-driven pipeline (Kafka + PostgreSQL + Redis, digital
# signatures already active in both modes), run with:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=event-driven
# after starting the infra with: docker compose up -d
# See application-event-driven.properties and docker-compose.yml.
# --------------------------------------------------------------------------
