# Activate with: --spring.profiles.active=event-driven
# (docker-compose.yml sets this automatically for the app container)
#
# This flips the app from the zero-setup H2 + in-process demo mode into the
# full pipeline: Phone -> Gateway -> Kafka -> Settlement -> Ledger -> Notification,
# backed by real PostgreSQL and Redis.

# ---------------------------------------------------------------- PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gossippay}
spring.datasource.username=${DB_USER:gossippay}
spring.datasource.password=${DB_PASSWORD:gossippay}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Disable the H2 console — irrelevant once Postgres is the datasource
spring.h2.console.enabled=false

# --------------------------------------------------------------------- Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# --------------------------------------------------------------------- Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.demo.upimesh.events

# The producer's JsonSerializer stamps each record with a __TypeId__ header
# (the fully-qualified event class). JsonDeserializer reads that header to
# pick the right target type per topic, so PacketReceivedEvent,
# SettlementCompletedEvent, and LedgerRecordedEvent can all safely share one
# ConsumerFactory even though each @KafkaListener method has a different
# typed parameter. Each @KafkaListener also sets its own explicit groupId in
# code, so no default consumer group is configured here.

spring.kafka.admin.fail-fast=false

# ------------------------------------------------------------------- tuning
upi.mesh.idempotency-ttl-seconds=86400
upi.mesh.packet-max-age-seconds=86400
upi.mesh.rate-limit.max-per-minute=10

# Reliability: how long a claim can sit in PENDING before the reaper assumes
# the owning Settlement Service instance died and releases it back up for
# retry. Matters more here than in the default profile since with multiple
# replicas a claim can be abandoned by one pod and correctly retried by another.
upi.mesh.idempotency-pending-timeout-seconds=120
upi.mesh.idempotency-reaper-interval-ms=30000
upi.mesh.reconciliation-interval-ms=60000
upi.mesh.reconciliation-lookback-seconds=3600

logging.level.com.demo.upimesh=INFO
logging.level.org.apache.kafka=WARN
