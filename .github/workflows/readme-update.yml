name: Update README

on:

  workflow_dispatch:

  schedule:
    - cron: "0 5 * * 0"

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v7

      - name: Update Timestamp

        run: |

          DATE=$(date)

          if grep -q "Last Build:" README.md; then
            sed -i "s|Last Build:.*|Last Build: ${DATE}|g" README.md
          else
            echo "" >> README.md
            echo "Last Build: ${DATE}" >> README.md
          fi

      - name: Commit

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          git diff --quiet && exit 0

          git add README.md

          git commit -m "docs: update README "

          git push