version: "3.8"

# Full event-driven stack:
#   Phone -> Gateway -> Kafka -> Settlement Service -> Ledger Service -> Notification Service
#                                        |
#                                  PostgreSQL + Redis
#
# Usage:
#   docker compose up -d --build
#   open http://localhost:8080
#
# Everything runs with spring.profiles.active=event-driven inside the app
# container. To go back to the original zero-setup demo, just run the app
# with mvnw spring-boot:run and no active profile (no docker needed at all).

services:

  postgres:
    image: postgres:16-alpine
    container_name: gossippay-postgres
    environment:
      POSTGRES_DB: gossippay
      POSTGRES_USER: gossippay
      POSTGRES_PASSWORD: gossippay
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gossippay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gossippay-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Single-node Kafka in KRaft mode — no Zookeeper needed.
  kafka:
    image: bitnami/kafka:3.7
    container_name: gossippay-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Optional: web UI to inspect Kafka topics/messages while demoing.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gossippay-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: gossippay
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  app:
    build: .
    container_name: gossippay-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: event-driven
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gossippay
      DB_USER: gossippay
      DB_PASSWORD: gossippay
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
